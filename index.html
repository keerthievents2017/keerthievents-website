<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KEERTHI EVENTS | Premium Birthday Architects</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #FF477E; --dark: #121212; --gold: #D4AF37; --whatsapp: #25D366; --insta: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; scroll-behavior: smooth; }

        body { 
            font-family: 'Poppins', sans-serif; margin: 0; background-color: #121212;
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            background-attachment: fixed; color: white; overflow-x: hidden; 
        }

        /* PREMIUM ENTRANCE */
        #site-entrance {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2c2c2c 0%, #000000 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            animation: fadeOutMain 1s forwards 3s;
        }
        #site-entrance h1 {
            font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900; color: var(--gold); text-shadow: 10px 10px 30px rgba(0,0,0,0.6);
            letter-spacing: 8px; text-transform: uppercase; margin: 0; text-align: center;
            animation: fadeInUp 2s ease-out forwards;
        }
        @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOutMain { 100% { opacity: 0; visibility: hidden; } }

        nav { padding: 15px 25px; display: flex; justify-content: center; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--gold); }

        header { 
            min-height: 60vh; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1530103043960-ef38714abb15?auto=format&fit=crop&w=1500&q=80'); 
            background-size: cover; background-position: center; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 25px; color: white;
        }

        /* SEPARATE SECTION STYLE */
        .section-box {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212,175,55,0.2); 
            padding: 25px; border-radius: 20px; margin-bottom: 25px; text-align: left;
        }
        .section-box h4 { font-family: 'Playfair Display', serif; color: var(--gold); margin: 0 0 15px 0; font-size: 18px; }

        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .checkbox-grid label { font-size: 13px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .checkbox-grid input { accent-color: var(--gold); transform: scale(1.2); }

        /* MAIN FORM CONTAINER */
        .main-container { 
            max-width: 800px; margin: 40px auto; background: rgba(255, 255, 255, 0.08); 
            padding: 40px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); width: 92%; backdrop-filter: blur(20px);
        }
        .input-field { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; font-family: inherit; }

        .btn-register { background: var(--gold); color: var(--dark); padding: 20px; border: none; width: 100%; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-register:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

        .floating-social { position: fixed; bottom: 25px; right: 25px; z-index: 1000; }
        .whatsapp { background: var(--whatsapp); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="site-entrance"><h1>KEERTHI<br>EVENTS</h1></div>

<nav><div class="logo">KEERTHI EVENTS</div></nav>

<header>
    <h1 style="font-family: 'Playfair Display'; color: var(--gold); font-size: clamp(2rem, 8vw, 3.5rem);">"Transforming Moments into Masterpieces."</h1>
    <p style="max-width: 700px; opacity: 0.8; margin-top: 20px;">Crafting premium celebrations since 2017.</p>
</header>

<div class="main-container">
    <form id="regForm" action="https://sheetdb.io/api/v1/l06xavka0btnf" method="POST">
        <h3 style="font-family: 'Playfair Display'; color: var(--gold); margin-bottom: 25px; text-align: center;">Event Reservation</h3>
        
        <input type="text" name="data[Name]" placeholder="Full Name" class="input-field" required>
        <input type="text" name="data[Phone]" placeholder="Contact Number" class="input-field" required>
        <input type="date" name="data[Event_Date]" class="input-field" required style="color-scheme: dark;">

        <div class="section-box">
            <h4>Select Your Preferred Themes</h4>
            <div class="checkbox-grid">
                <label><input type="checkbox" name="data[Custom_Theme]" value="Jungle Theme"> Jungle Safari</label>
                <label><input type="checkbox" name="data[Custom_Theme]" value="Princess/Barbie"> Princess/Barbie</label>
                <label><input type="checkbox" name="data[Custom_Theme]" value="Space Adventure"> Space Adventure</label>
                <label><input type="checkbox" name="data[Custom_Theme]" value="Luxury Floral"> Luxury Floral</label>
                <label><input type="checkbox" name="data[Custom_Theme]" value="Cocomelon"> Cocomelon</label>
                <label><input type="checkbox" name="data[Custom_Theme]" value="Custom/Other"> Other (Specify below)</label>
            </div>
            <input type="text" name="data[Theme_Details]" placeholder="Details for custom theme..." class="input-field" style="margin-top: 15px; font-size: 13px;">
        </div>

        <div class="section-box">
            <h4>Entertainment Activities</h4>
            <div class="checkbox-grid">
                <label><input type="checkbox" name="data[Activities]" value="Magic Show"> Magic Show</label>
                <label><input type="checkbox" name="data[Activities]" value="Tattoo Artist"> Tattoo Artist</label>
                <label><input type="checkbox" name="data[Activities]" value="Mascot"> Mascot</label>
                <label><input type="checkbox" name="data[Activities]" value="Game Anchor"> Game Anchor</label>
                <label><input type="checkbox" name="data[Activities]" value="Live Stalls"> Live Stalls</label>
                <label><input type="checkbox" name="data[Activities]" value="Photography"> Photography</label>
            </div>
        </div>

        <button type="submit" class="btn-register">REGISTER NOW</button>
    </form>
</div>

<section style="text-align: center; padding: 100px 20px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.9));">
    <h2 style="font-family: 'Playfair Display'; color: var(--gold);">Crafting unforgettable</h2>
    <h2 style="font-family: 'Playfair Display'; color: var(--gold);">memories of your life.</h2>
    <div style="margin-top: 40px; color: var(--gold); font-family: 'Playfair Display'; font-size: 1.2rem; letter-spacing: 4px;">KEERTHI EVENTS</div>
    <div style="font-size: 11px; opacity: 0.5; margin-top: 10px; letter-spacing: 2px;">EST. 2017 | ALL INDIA SERVICE</div>
</section>

<div class="floating-social">
    <a href="https://wa.me/917893189877" target="_blank" class="whatsapp">
        <img src="https://img.icons8.com/color/48/whatsapp--v1.png" width="32">
    </a>
</div>

<script>
    document.getElementById('regForm').onsubmit = function(e) {
        e.preventDefault();
        fetch(this.action, { method: "POST", body: new FormData(this) })
        .then(() => { 
            alert("Thank you for choosing Keerthi Events! We will contact you shortly."); 
            this.reset(); 
        });
    };
</script>

</body>
</html>
